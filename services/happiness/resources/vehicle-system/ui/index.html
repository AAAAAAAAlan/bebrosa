<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vehicle System Debug</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="telemetry" aria-label="Vehicle telemetry">
        <div class="title">VEHICLE SYSTEM</div>
        <dl>
            <div><dt>VEHICLE</dt><dd id="vehicle">INACTIVE</dd></div>
            <div><dt>GEAR</dt><dd id="gear">-</dd></div>
            <div><dt>RPM</dt><dd id="rpm">0</dd></div>
            <div><dt>RATIO</dt><dd id="ratio">-</dd></div>
            <div><dt>CLUTCH</dt><dd id="clutch">RELEASED</dd></div>
            <div><dt>ENGINE</dt><dd id="engine">OFF</dd></div>
            <div><dt>SPEED</dt><dd><span id="speed">0</span> KM/H</dd></div>
            <div><dt>STATUS</dt><dd id="status">INACTIVE</dd></div>
        </dl>
    </main>
    <script src="app.js"></script>
</body>
</html>
